<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>謎解き判定</title>

<style>

/* 背景イラスト設定 */
body{
margin: 0;
height: 100vh;

background-image: url("haikei.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;

position: relative;
font-family: sans-serif;
}


/* 四隅の判定ボックス */
.box{
position: absolute;
background: rgba(255,255,255,0.9);
padding: 15px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.3);
width: 150px;
text-align: center;
}


/* 四隅の位置 */
.left-top{
top: 200px;
left: 200px;
}

.right-top{
top: 200px;
right: 200px;
}

.left-bottom{
bottom: 200px;
left: 200px;
}

.right-bottom{
bottom: 200px;
right: 200px;
}


/* 中央の最終判定ボタン */

.center{
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%,-50%);
text-align: center;
background: rgba(255,255,255,0.9);
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 15px rgba(0,0,0,0.4);
}


/* ボタンデザイン */

button{
margin-top: 10px;
padding: 5px 15px;
}

</style>

</head>



<body>


<div class="box left-top">
<p>左上</p>
<input type="text" id="a1">
</div>

  
<div class="box right-top">
<p>右上</p>
<input type="text" id="a2">
</div>


<div class="box left-bottom">
<p>左下</p>
<input type="text" id="a3">
</div>

  
<div class="box right-bottom">
<p>右下</p>
<input type="text" id="a4">
</div>


<div class="center">
<button onclick="check()">最終判定</button>
<p id="result"></p>
</div>




<script>
function check(){
var a1 = document.getElementById("a1").value;
var a2 = document.getElementById("a2").value;
var a3 = document.getElementById("a3").value;
var a4 = document.getElementById("a4").value;



/* 正解を書く場所 */

if(
a1 == "いろり" &&
a2 == "あかし" &&
a3 == "はいいん" &&
a4 == "しろっぷ"
){

document.getElementById("result").innerHTML = "正解じゃ！おめでとう！";

}else{

document.getElementById("result").innerHTML = "違うのじゃ…";

}

}


</script>



</body>
</html>
