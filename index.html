<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>阿吽</title>

<style>

/* 画面中央に配置する魔法 */
body{
height: 100vh;
margin: 0;
position: relative;
}

/* 判定ボックス */
.box{
position: absolute;
background: white;
padding: 30px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* 左上 */
.left-top{
top: 20px;
left: 20px;
}


/* 左下 */
.left-bottom{
bottom: 20px;
left: 20px;
}


/* 右上 */
.right-top{
top: 20px;
right: 20px;
}


/* 右下 */
.right-bottom{
bottom: 20px;
right: 20px;
}

button{
margin-top: 10px;
padding: 5px 15px;
}

</style>

</head>

<body>

<h2>4つの答えを入力するのじゃ！</h2>

<div class="box left-top">左上の判定</div>
<div class="box left-bottom">左下の判定</div>
<div class="box right-top">右上の判定</div>
<div class="box right-bottom">右下の判定</div>

<button class="button" onclick="check()">最終判定</button>

<p id="result"></p>


<script>

function check(){

var a1 = document.getElementById("a1").value;
var a2 = document.getElementById("a2").value;
var a3 = document.getElementById("a3").value;
var a4 = document.getElementById("a4").value;


/* ここに正解を書くのじゃ */

if(
a1 == "いろり" &&
a2 == "あかし" &&
a3 == "はいいん" &&
a4 == "しろっぷ"
){

document.getElementById("result").innerHTML = "正解じゃ！おめでとう！";

}else{

document.getElementById("result").innerHTML = "違うのじゃ…";

}

}

</script>


</body>
</html>
