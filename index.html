<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>謎解き解答ページ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   全体設定
========================= */

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

/* コンテナ */
.wrapper{
position:relative;
max-width:1000px;
margin:0 auto;
}

/* 問題画像 */
.main-image{
width:100%;
display:block;
}

/* =========================
   女の子（左右固定）
========================= */

.girl-left,
.girl-right{
position:fixed;
bottom:0;
width:220px;
z-index:0;
}

.girl-left{
left:0;
}

.girl-right{
right:0;
}

/* =========================
   解答欄
========================= */

.answer{
position:absolute;
z-index:10;
}

.answer input{
padding:8px;
font-size:16px;
width:120px;
border-radius:6px;
border:2px solid #333;
}


/* 4問の位置（PC基準） */

.a1{ top:12%; left:18%; }
.a2{ top:12%; right:18%; }
.a3{ bottom:22%; left:18%; }
.a4{ bottom:22%; right:18%; }


/* =========================
   中央判定ボタン
========================= */

.center-check{
text-align:center;
margin:30px 0;
}

button{
padding:10px 20px;
font-size:18px;
border-radius:8px;
border:none;
background:#333;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

/* =========================
   スマホ対応
========================= */

@media screen and (max-width:768px){

.girl-left,
.girl-right{
display:none;
}

.answer{
position:static;
margin:15px auto;
text-align:center;
}

.wrapper{
padding:10px;
}

}

</style>
</head>

<body>

<!-- 左右の女の子 -->
<img src="girl_left.png" class="girl-left">
<img src="girl_right.png" class="girl-right">

<div class="wrapper">

<img src="problem.png" class="main-image">

<!-- 解答欄 -->
<div class="answer a1"><input type="text" id="a1" placeholder="解答①"></div>
<div class="answer a2"><input type="text" id="a2" placeholder="解答②"></div>
<div class="answer a3"><input type="text" id="a3" placeholder="解答③"></div>
<div class="answer a4"><input type="text" id="a4" placeholder="解答④"></div>

<div class="center-check">
<button onclick="check()">最終判定</button>
<p id="result"></p>
</div>

</div>

<script>

function check(){

var a1 = document.getElementById("a1").value;
var a2 = document.getElementById("a2").value;
var a3 = document.getElementById("a3").value;
var a4 = document.getElementById("a4").value;

if(
a1=="答え1" &&
a2=="答え2" &&
a3=="答え3" &&
a4=="答え4"
){
document.getElementById("result").innerHTML="正解！";
}else{
document.getElementById("result").innerHTML="違います";
}

}

</script>

</body>
</html>
