<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿吽解答ページ</title>

<style>

body{
margin:0;
background:#eee;
font-family:sans-serif;
}

/* 中央コンテナ */
.wrapper{
position:relative;
max-width:1000px;
margin:0 auto;
}

/* 問題画像 */
.main-image{
width:50%;
display:block;
}

/* 解答欄共通 */
.answer{
position:absolute;
}

.answer input{
padding:10px;
font-size:16px;
width:130px;
border-radius:8px;
border:3px solid;
background:white;
}

/* ===== 左側（赤） ===== */

.left input{
border-color:#d33;
box-shadow:0 0 10px rgba(255,0,0,0.4);
}

/* ===== 右側（緑） ===== */

.right input{
border-color:#2c9b2c;
box-shadow:0 0 10px rgba(0,255,0,0.4);
}

/* 位置調整（ここは微調整ポイント） */

.a1{ top:100px; left:100px; }
.a2{ top:100px; right:100px; }
.a3{ top:400px; left:100px; }
.a4{ top:400px; right:100px; }

/* 中央ボタン */
.center-check{
text-align:center;
margin:30px 0;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

/* ===== スマホ対応 ===== */

@media screen and (max-width:768px){

.answer{
position:static;
margin:15px auto;
text-align:center;
}

.wrapper{
padding:10px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<img src="aun_title.png" class="main-image">

<!-- 左上（赤） -->
<div class="answer a1 left">
<input type="text" id="a1" placeholder="左上の解答">
</div>

<!-- 右上（緑） -->
<div class="answer a2 right">
<input type="text" id="a2" placeholder="右上の解答">
</div>

<!-- 左下（赤） -->
<div class="answer a3 left">
<input type="text" id="a3" placeholder="左下の解答">
</div>

<!-- 右下（緑） -->
<div class="answer a4 right">
<input type="text" id="a4" placeholder="右下の解答">
</div>

<div class="center-check">
<button onclick="check()">最終判定</button>
<p id="result"></p>
</div>

</div>

<script>

function check(){

var a1=document.getElementById("a1").value;
var a2=document.getElementById("a2").value;
var a3=document.getElementById("a3").value;
var a4=document.getElementById("a4").value;

if(
a1=="いろり" &&
a2=="はいいん" &&
a3=="あかし" &&
a4=="しろっぷ"
){
document.getElementById("result").innerHTML="正解！";
}else{
document.getElementById("result").innerHTML="何かが違うようです";
}

}

</script>

</body>
</html>
