<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>謎解き解答ページ</title>

<style>

body{
margin:0;
background:#ffffff;
font-family:sans-serif;
}

/* 全体 */
.wrapper{
max-width:900px;
margin:auto;
text-align:center;
padding:20px;
}

/* タイトル */
.title-image{
width:80%;
max-width:320px;
margin-bottom:20px;
}

/* 入力欄 */

.answer input{
padding:12px;
font-size:16px;
width:180px;
border-radius:8px;
border:3px solid #333;
}

/* ボタン */

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

/* エラーメッセージ */

#result{
margin-top:15px;
color:#d33;
font-weight:bold;
}

/* 表示ボックス */

.box{

opacity:0;
transform:translateY(20px);
transition:0.6s;

width:80%;
max-width:400px;

margin:30px auto;
padding:20px;

background:white;

border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);

pointer-events:none;
}

/* 表示状態 */

.box.show{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

/* 見出し */

.box-title{
font-size:22px;
font-weight:bold;
color:#d33;
margin-bottom:10px;
}

/* 画像 */

.box img{
width:80%;
max-width:300px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<img src="title.png" class="title-image">

<div class="answer">
<input type="text" id="answer" placeholder="答えを入力">
</div>

<button onclick="check()">判定</button>

<p id="result"></p>


<!-- Step表示 -->

<div class="box" id="stepBox">

<p class="box-title">正解！</p>

<p>Step2</p>

<img src="step2.png">

</div>


<!-- Clear表示 -->

<div class="box" id="clearBox">

<p class="box-title">CLEAR！</p>

<p>
作者：
<a href="https://x.com/USERNAME" target="_blank">
作者名
</a>
</p>

<p>
<a id="tweetLink" target="_blank">
クリアをツイートする
</a>
</p>

</div>

</div>

<script>

function check(){

var input =
document.getElementById("answer").value;

var result =
document.getElementById("result");

var stepBox =
document.getElementById("stepBox");

var clearBox =
document.getElementById("clearBox");

/* 初期化 */

result.innerHTML="";
stepBox.classList.remove("show");
clearBox.classList.remove("show");

/* 答え */

var stepAnswer =
["たけうま","タケウマ","竹馬"];

var finalAnswer =
["あんさー","アンサー"];


/* 判定 */

if(stepAnswer.includes(input)){

stepBox.classList.add("show");

}

else if(finalAnswer.includes(input)){

clearBox.classList.add("show");

/* ツイート */

var tweetText=
"謎解きをクリアした！";

var tweetURL=
"https://twitter.com/intent/tweet?text="
+ encodeURIComponent(tweetText);

document.getElementById("tweetLink").href=tweetURL;

}

else{

result.innerHTML="何かが違うようです";

}

}

</script>

</body>
</html>
